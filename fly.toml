# Fly.io — deploy with: fly launch (then fly deploy)
# Docs: https://fly.io/docs/rails/getting-started/

app = "we-match"
primary_region = "iad"
console_command = "/rails/bin/rails console"

[build]
  dockerfile = "Dockerfile"

[env]
  RAILS_ENV = "production"
  PORT = "3000"
  SHOW_MAILER_PREVIEWS = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "30s"
    method = "GET"
    path = "/up"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
